<style>
/* ── Loading screen ─────────────────────────────── */
#prop-loader {
  position: fixed; inset: 0; z-index: 99999;
  background: #0e0e0e;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: "IBM Plex Sans", "IBM Plex Sans KR", system-ui, sans-serif;
  transition: opacity 0.55s cubic-bezier(0.4,0,0.2,1);
  user-select: none;
}
#prop-loader.hiding { opacity: 0; pointer-events: none; }

.pl-ring { position: relative; width: 88px; height: 88px; margin-bottom: 28px; }
.pl-ring svg { position: absolute; inset: 0; }
.pl-ring-track { stroke: rgba(255,255,255,0.07); fill: none; }
.pl-ring-fill {
  stroke: #e76709; fill: none; stroke-linecap: round;
  stroke-dasharray: 226; stroke-dashoffset: 226;
  transform-origin: center; transform: rotate(-90deg);
  transition: stroke-dashoffset 0.4s cubic-bezier(0.4,0,0.2,1);
}
.pl-center {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
}
.pl-logo-mark {
  font-size: 26px; font-weight: 700; letter-spacing: -1px; color: #87ce5b;
  animation: pl-pulse 2s ease-in-out infinite;
}
@keyframes pl-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

.pl-brand { text-align: center; margin-bottom: 32px; }
.pl-name {
  font-size: 20px; font-weight: 700; letter-spacing: -.3px; color: #fff; margin-bottom: 4px;
}
.pl-name .sight  { color: #e76709; }
.pl-name .prop   { color: #87ce5b; font-size: 13px; font-weight: 700; margin-left: 4px; }
.pl-name .ana    { font-size: 13px; font-weight: 400; color: rgba(255,255,255,.4); }
.pl-sub {
  font-size: 11px; font-weight: 500; letter-spacing: .18em;
  text-transform: uppercase; color: rgba(255,255,255,.3);
}

.pl-checks { display: flex; flex-direction: column; gap: 10px; min-width: 220px; margin-bottom: 28px; }
.pl-check {
  display: flex; align-items: center; gap: 10px;
  font-size: 12px; color: rgba(255,255,255,.3); transition: color 0.3s;
}
.pl-check.done   { color: rgba(255,255,255,.75); }
.pl-check.failed { color: #e05c5c; }
.pl-dot {
  width: 16px; height: 16px; flex-shrink: 0; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,.15);
  display: flex; align-items: center; justify-content: center;
  transition: all .3s; position: relative;
}
.pl-dot::after {
  content: ""; position: absolute; inset: -2px; border-radius: 50%;
  border: 1.5px solid transparent; border-top-color: #e76709;
  animation: pl-spin .8s linear infinite; opacity: 0; transition: opacity .2s;
}
@keyframes pl-spin { to { transform: rotate(360deg); } }
.pl-check.waiting .pl-dot::after { opacity: 1; }
.pl-check.done .pl-dot { background: #e76709; border-color: #e76709; }
.pl-check.done .pl-dot::after { display: none; }
.pl-dot-chk { display: none; }
.pl-check.done .pl-dot-chk { display: block; }

.pl-bar-wrap {
  width: 200px; height: 3px; background: rgba(255,255,255,.07);
  border-radius: 2px; overflow: hidden; margin-bottom: 10px;
}
.pl-bar-fill {
  height: 100%; width: 0; background: #e76709; border-radius: 2px;
  transition: width .4s cubic-bezier(.4,0,.2,1);
}
.pl-status { font-size: 11px; color: rgba(255,255,255,.3); }
.pl-version {
  position: absolute; bottom: 24px;
  font-size: 10px; color: rgba(255,255,255,.1);
  letter-spacing: .08em; font-family: "IBM Plex Mono", monospace;
}
</style>

  <div class="pl-bar-wrap"><div class="pl-bar-fill" id="pl-bar-fill"></div></div>

<!-- App root -->
<div id="root"></div>

<!-- Loading controller -->
<script>
(function () {
  var STEPS = [
    { id: "plc-react",   check: function() { return !!(window.React && window.ReactDOM && window.Babel); }, label: "React + Babel 로드 완료" },
    { id: "plc-echarts", check: function() { return !!window.echarts; },                                    label: "ECharts 로드 완료" },
    { id: "plc-data",    check: function() { return !!(window.NODE && window.NODE.datasets && window.Store); }, label: "데이터 엔진 준비됨" },
    { id: "plc-app",     check: function() { var r = document.getElementById("root"); return !!(r && r.children.length > 0); }, label: "앱 시작됨" },
  ];
  var TOTAL = STEPS.length, completed = 0, timers = [];
  function pct() { return Math.round((completed / TOTAL) * 100); }
  function setRing(p) {
    var c = document.getElementById("pl-ring-fill");
    if (c) c.style.strokeDashoffset = 226 - (p / 100) * 226;
  }
  function setBar(p) {
    var b = document.getElementById("pl-bar-fill"); if (b) b.style.width = p + "%"; setRing(p);
  }
  function setStatus(m) { var e = document.getElementById("pl-status"); if (e) e.textContent = m; }
  function markDone(id, label) {
    var el = document.getElementById(id); if (!el) return;
    el.classList.remove("waiting"); el.classList.add("done");
    completed++; setBar(pct()); setStatus(label);
    if (completed >= TOTAL) setTimeout(dismiss, 380);
  }
  function markFailed(id, msg) {
    var el = document.getElementById(id); if (!el) return;
    el.classList.remove("waiting"); el.classList.add("failed");
    setStatus("⚠ " + msg);
    completed++; setBar(pct()); if (completed >= TOTAL) setTimeout(dismiss, 600);
  }
  function pollStep(step, index, attempt) {
    attempt = attempt || 0;
    var MAX = index < 2 ? 8000 : 12000, INT = 60;
    if (step.check()) { markDone(step.id, step.label); return; }
    if (attempt * INT > MAX) { markFailed(step.id, step.id + " 로드 실패"); return; }
    var t = setTimeout(function() { pollStep(step, index, attempt + 1); }, INT);
    timers.push(t);
  }
  function dismiss() {
    timers.forEach(function(t) { clearTimeout(t); });
    var l = document.getElementById("prop-loader"); if (!l) return;
    l.classList.add("hiding");
    setTimeout(function() { if (l.parentNode) l.parentNode.removeChild(l); }, 580);
  }
  STEPS.forEach(function(s, i) { setTimeout(function() { pollStep(s, i); }, i * 120); });
  setTimeout(function() { var l = document.getElementById("prop-loader"); if (l && !l.classList.contains("hiding")) dismiss(); }, 15000);
})();
</script>
