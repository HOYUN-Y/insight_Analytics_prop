<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>insight Planning Workbench — Drafts</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/tokens.css" />
<link rel="stylesheet" href="css/shell.css" />
<link rel="stylesheet" href="css/drafts.css" />
<style>
  html, body { margin: 0; height: 100%; background: #f0eee9; }
  #root { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" rx="20" fill="#221a14" />
    <g transform="translate(28 30)">
      <path d="M2 36V6M2 36h42M14 28l10-12 8 6 12-16" fill="none" stroke="#E8611A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
    </g>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="js/icons.jsx"></script>
<script type="text/babel" src="js/planStore.jsx"></script>
<script type="text/babel" src="js/shell.jsx"></script>
<script type="text/babel" src="js/brand.jsx"></script>
<script type="text/babel" src="js/pages.jsx"></script>
<script type="text/babel" src="js/draftA.jsx"></script>
<script type="text/babel" src="js/draftB.jsx"></script>
<script type="text/babel" src="js/draftC.jsx"></script>
<script type="text/babel" src="js/projectBrief.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="brand" title="브랜드 — insight Analytics Prop (연두)" subtitle="insight Analytics 유지 + 부동산 도메인 Prop 을 연두로 표기. accent 시스템 포함.">
          <DCArtboard id="brand-strip" label="Identity · Family · Accent" width={1440} height={440}>
            <window.BrandStrip />
          </DCArtboard>
        </DCSection>

        <DCSection id="planning" title="Planning Studio — 메인 화면 드래프트" subtitle="프로젝트 생성 시 가장 먼저 열리는 허브 화면. 같은 브랜드, 다른 작업 메타포 3종.">
          <DCArtboard id="draft-a" label="A · Planning Cockpit — 워크벤치 정통 3패널" width={1440} height={900}>
            <window.DraftA />
          </DCArtboard>
          <DCArtboard id="draft-b" label="B · Planning Canvas — Miro/FigJam 보드" width={1440} height={900}>
            <window.DraftB />
          </DCArtboard>
          <DCArtboard id="draft-c" label="C · Planning Docs — Notion/Obsidian 문서형" width={1440} height={900}>
            <window.DraftC />
          </DCArtboard>
        </DCSection>

        <DCSection id="brief" title="Project Brief — 셋업 화면" subtitle="Plan 트리의 'Project Brief' 탭. 기본 정보·사업유형·분석목적을 채우면 우측 프로젝트 카드가 실시간으로 완성됩니다.">
          <DCArtboard id="pb" label="Project Brief — 폼 + 라이브 카드 미리보기" width={1440} height={900}>
            <window.ProjectBrief />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
